<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sun to moon · mihneaptu/lab</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Sets the theme BEFORE the page paints, so there's no flash of the
       wrong colors. Your last choice wins; otherwise the OS preference. -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>

  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/base.css">

  <style>
    /* A single specimen, centered on the page like an exhibit. */
    body {
      min-height: 100vh;  /* fallback for browsers without dvh */
      min-height: 100dvh; /* the VISIBLE viewport on mobile — 100vh includes
                             the space behind the retractable URL bar, which
                             pushed the exhibit below true center */
      display: grid;
      place-items: center;
      padding: var(--space-8) var(--space-6) var(--space-6);
      /* The sky doesn't snap to night — the paper crossfades on the
         morph's own clock, so the world changes WITH the sun, not
         before it. */
      transition: background-color 500ms ease;
    }

    .sky-specimen {
      display: grid;
      justify-items: center;
      row-gap: var(--space-5);
    }

    /* --- The toggle ------------------------------------------------------
       A round button that holds the icon — styled like a piece of lab
       chrome (surface, hairline border), not like the primary .btn. */

    .sky-toggle {
      /* The morph's shared clock. One ease for everything keeps the
         disc, rays, and mask feeling like a single object transforming
         instead of three animations that happen to run at once.
         A symmetric ease-in-out, NOT an exponential ease-out: an
         exponential curve finishes ~70% of the travel in the first
         tenth of a second, so the rays looked like they blinked out
         rather than plunged in. This curve spends its speed in the
         middle, where the eye can actually watch the parts travel. */
      --sky-ease: cubic-bezier(0.65, 0, 0.35, 1);
      --sky-time: 400ms;

      position: relative; /* anchors the dot-grid layer below */
      width: 176px;
      height: 176px;
      display: grid;
      place-items: center;
      color: var(--ink); /* the svg draws with currentColor */
      background-color: var(--surface);
      border: 1px solid var(--line);
      border-radius: 50%;
      /* md at rest, not sm: at 176px the chip-sized shadow reads as
         "pasted on"; a big object needs a shadow that matches its size
         to look like it's resting on the paper.
         The FIXED light alias, deliberately: crossfading a box-shadow
         between themes re-blurs it on the CPU every frame for the whole
         500ms flip — the main thing that starved the morph of frames on
         phones. So the button wears the light shadow permanently (a
         faint black glow is invisible on the dark paper anyway), and
         ::after below fades the dark theme's shadow in over it on the
         GPU-cheap opacity channel instead. */
      box-shadow: var(--shadow-md-light);
      cursor: pointer;
      /* the finger drives the cursor jiggle (see the script), so
         horizontal drags across the button must reach it as pointer
         moves instead of being eaten as a failed scroll — pan-y keeps
         vertical swipes scrolling the page like anywhere else */
      touch-action: pan-y;
      /* only the press stays on the fast micro-feedback clock; border,
         surface, and ink all ride the same slow crossfade as the paper.
         Anything on a faster clock flips to the new theme ahead of the
         surface and draws attention to itself — the border did exactly
         that (a bright ring around the still-dark circle).
         box-shadow stays in the list, but the theme flip no longer
         touches it — only the desktop hover bloom does, and that reads
         better slow too: light shifting over an object, not a control
         lighting up. */
      transition: transform 180ms cubic-bezier(0.2, 0, 0, 1),
                  box-shadow 500ms ease,
                  background-color 500ms ease,
                  border-color 500ms ease,
                  color 500ms ease;
    }

    /* The dot grid lives on its own layer because a background-image
       can't transition — the dots were snapping to the new theme while
       everything else faded. The trick: this layer is a plain solid
       color (which CAN transition), and a mask punches the dot pattern
       out of it. The mask never changes; only the color crossfades,
       on the same 500ms clock as everything else. */
    .sky-toggle::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-color: var(--line);
      -webkit-mask-image: radial-gradient(#000 1px, transparent 1px);
      -webkit-mask-size: 14px 14px;
      mask-image: radial-gradient(#000 1px, transparent 1px);
      mask-size: 14px 14px;
      transition: background-color 500ms ease;
      pointer-events: none;
    }

    /* The dark theme's shadow, pre-painted on its own layer and simply
       faded in when night falls. An opacity crossfade runs on the GPU
       compositor; transitioning the box-shadow itself re-blurs those
       big soft layers on the CPU during every frame of the 500ms flip —
       exactly the frames the rays need for their 170ms plunge. On a
       phone that contest dropped enough frames that the rays seemed to
       hesitate, then blink out.
       The layer is transparent, so only its shadow paints: the outer
       glow lands outside the button's edge, and the inset top rim hugs
       the rim far above the icon — nothing to cover, no z-index games. */
    .sky-toggle::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: var(--shadow-md-dark);
      opacity: 0;
      /* box-shadow is only here for the desktop hover bloom below —
         the theme flip rides opacity alone */
      transition: opacity 500ms ease, box-shadow 500ms ease;
      pointer-events: none;
    }

    [data-theme="dark"] .sky-toggle::after {
      opacity: 1;
    }

    /* position: relative lifts the icon above the dot layer (positioned
       pseudo-elements paint over static children otherwise) */
    .sky-icon {
      position: relative;
    }

    /* Hover: a gentle 2px rise with the shadow deepening one step —
       the object floating up to meet the cursor, not a control
       lighting up. (The rise is on a quick 180ms clock; the shadow
       blooms slowly behind it.)
       Gated behind (hover: hover): a phone has no cursor, but a tap
       APPLIES :hover anyway — and then it STICKS after the finger
       lifts. That piled the rise and the shadow bloom onto the same
       overloaded first frames of the morph, and left the button
       floating at -2px afterwards. Mouse devices are unaffected. */
    @media (hover: hover) {
      .sky-toggle:hover {
        box-shadow: var(--shadow-lg-light);
        transform: translateY(-2px);
      }

      /* the night sky's copy of the bloom, on its own layer */
      .sky-toggle:hover::after {
        box-shadow: var(--shadow-lg-dark);
      }
    }

    /* Pressing the sky: the rise collapses and the button gives
       slightly under the finger, like a physical switch. */
    .sky-toggle:active {
      transform: scale(0.97);
    }

    .sky-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* --- The icon --------------------------------------------------------
       One svg, three moving parts:

         .disc — the sun's body, a filled circle.
         .rays — eight short lines around it.
         .bite — an invisible circle inside a <mask>, parked off-canvas.

       The moon is never drawn. It's what's LEFT of the sun's disc after
       the bite slides over it: the mask's white rectangle keeps the disc
       visible, and wherever the black bite circle overlaps, the disc is
       punched out. Slide the bite across one edge and a crescent remains. */

    .sky-icon {
      width: 72px;
      height: 72px;
      /* the sunrise overshoot pokes the ray caps a hair past the
         viewBox — let them, instead of clipping them flat */
      overflow: visible;
    }

    /* transform-box: view-box makes "center" mean the middle of the
       24x24 viewBox (12,12) — the point the disc grows from and the
       rays rotate around. Without it, each line would use its own
       tiny bounding box and the rays would spin in place. */
    .disc,
    .rays {
      transform-box: view-box;
      transform-origin: center;
    }

    /* The three parts share one clock and one ease but start staggered,
       so each motion hands off to the next and the whole thing reads
       as ONE object transforming. The delays below are the moon→sun
       direction (the crescent heals, the disc shrinks, the rays climb
       back out last); the .is-moon block flips the order. */

    .bite {
      transition: transform var(--sky-time) var(--sky-ease);
    }

    .disc {
      transition: transform var(--sky-time) var(--sky-ease) 40ms;
    }

    /* The rays run on a slightly quicker clock than the other parts.
       This is what lets everything play AT THE SAME TIME: the bite's
       hole sweeps right through the space the right ray is retreating
       from, so the rays must always be one step ahead of it — faster,
       not earlier, keeps the whole morph simultaneous.
       Their ease has a small overshoot: at sunrise the rays stretch a
       hair past resting length and settle back — arrival with weight,
       not interpolation. (Nightfall does NOT inherit this ease — the
       overshoot is an arrival move, and its front-loaded start made
       the plunge read as a flick; see the .is-moon block.) */
    .rays {
      transition: transform calc(var(--sky-time) - 80ms)
                  cubic-bezier(0.34, 1.3, 0.64, 1) 140ms;
    }

    /* --- The moon state --------------------------------------------------
       Sun → moon: the rays plunge inward and are swallowed by the
       swelling disc, then the bite slides in from the top-right to
       carve the crescent. Going back, the disc heals and shrinks, and
       the rays climb back out of it. */

    .sky-toggle.is-moon .rays {
      /* No fade: the rays are drawn UNDER the disc in the same color,
         so shrinking them toward the center makes the swelling disc
         swallow them whole. The rotation turns the plunge into a
         turn of the sky — clockwise, sweeping toward the hollow the
         bite is about to carve. (scale 0.25 parks them well inside
         r=6, safely covered even before the disc finishes growing.)
         240ms on the symmetric ease, not the base rule's 170ms on the
         overshoot ease: that combination finished most of the travel
         in the first few hundredths, which a 60Hz phone screen shows
         as ~3 frames — a flick, not a plunge. The symmetric curve
         spends its speed in the middle where the eye can follow it,
         and the stretch is still safe: the rays' tips sink inside the
         swelling disc by ~150ms, before the bite's notch touches the
         rim (~170ms), and they finish (240ms) well ahead of the
         carve (325ms) — still faster than the parts chasing them. */
      transform: rotate(45deg) scale(0.25);
      transition-duration: 240ms;
      transition-timing-function: var(--sky-ease);
      transition-delay: 0ms; /* the rays lead going to the moon... */
    }

    .sky-toggle.is-moon .disc {
      /* r=6 scaled 1.75x reads as a proper moon; still inside the box.
         The stretched clock is deliberate: the swell must OUTLAST the
         bite (which runs 85-325ms), so the crescent is carved out of
         a body that's visibly still growing — grow-and-carve as one
         event, not grow, stop, carve. */
      transform: scale(1.75);
      transition-duration: 360ms;
      transition-delay: 25ms; /* ...the disc swells as they sink in... */
    }

    .sky-toggle.is-moon .bite {
      /* Parked at cx=36, this lands the bite at (17.3,10.5) — about
         5.5 units off the disc's center, leaving a crescent ~7 units
         thick that opens toward the top-right.
         These three numbers move together: the park spot slid from 33
         to 36 for jiggle clearance (see the mask), which stretched the
         travel, so a longer clock and a shorter hold keep the visible
         carve on the old schedule — the notch reaches the rim ~150ms
         in, once the rays are most of the way home (any earlier and it
         shows on the right rim while the LEFT rays still have the
         longest journey, and the right side visibly wins the race),
         and the sweep still finishes at 325ms, inside the disc's
         swell. Rays land, then the carve sweeps. */
      transform: translate(-18.7px, 0);
      transition-duration: 285ms;
      transition-delay: 40ms;
    }

    /* Going back (moon → sun) the base rules above already reverse
       everything; the 60ms delay on .rays means the crescent heals
       first and the rays pop out a beat later. */

    /* --- The stars --------------------------------------------------------
       The payoff: once the crescent has settled, two small stars fly
       out of it into the hollow it carved — and when day returns they
       dive back in, eaten by the moon. No opacity tricks: their HOME
       position is tucked inside the crescent's flesh, where ink on ink
       is simply invisible (the same trick that hides the swallowed
       rays). The spot is chosen to sit inside the small sun disc too,
       so they stay hidden in daylight as well. */

    .star {
      transform-box: fill-box;
      transform-origin: center;
      /* return flight: dive back into the moon right away */
      transition: transform 280ms var(--sky-ease);
    }

    .star-1 {
      opacity: 0.9;
      transform: translate(-11.2px, 5.8px) scale(0.8);
    }

    .star-2 {
      opacity: 0.7; /* a touch dimmer — reads as farther away */
      transform: translate(-12.9px, 1.6px) scale(0.8);
    }

    /* Night falls: the moon releases its stars while the crescent is
       still being carved — they launch invisible over its flesh, and
       the sweeping bite uncovers them mid-flight. Staggered so they read as two arrivals, and on
       a springy ease so they POP into place — a touch past their spot,
       then settle, like something small coming to rest. */
    .sky-toggle.is-moon .star {
      transform: none;
      /* the launch rides the faster nightfall clock, same ~60% tempo
         as the rest of the sun-to-moon morph */
      transition-duration: 170ms;
      transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sky-toggle.is-moon .star-1 {
      transition-delay: 145ms;
    }

    .sky-toggle.is-moon .star-2 {
      transition-delay: 195ms;
    }

    /* --- Caption ---------------------------------------------------------
       Quiet mono metadata under the exhibit, like a specimen label. */

    .sky-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--ink-muted);
      user-select: none;
      /* No slow color fade here: the word swaps early in the morph
         (130ms). The color flip must be DONE before that — CSS
         transitions and setTimeout run on different clocks, and if
         they aim at the same instant the swap can land a frame early,
         flashing the new word in the old ink. The ink fade starts a
         couple of frames late (the script defers the theme flip by one
         painted frame), so ~32ms + 80ms lands it around 112ms — still
         a safe gap before the swap. */
      transition: color 80ms ease;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../../index.html">&larr; back</a>

  <main class="sky-specimen">
    <!-- Not just a demo: this button is the page's real theme switch.
         Sun = light theme, moon = dark theme, saved the same way the
         header toggle on other pages saves it (localStorage), so the
         choice follows you around the lab. -->
    <button
      class="sky-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Switch color theme"
    >
      <svg class="sky-icon" viewBox="0 0 24 24" aria-hidden="true">
        <mask id="crescent-mask" maskUnits="userSpaceOnUse" x="-3" y="-3" width="30" height="30">
          <!-- White = keep, black = punch out. The white rect runs 3
               units PAST the viewBox on every side (and the mask's own
               painting region is widened to match — left alone it hugs
               the drawing's box and clips there instead): the ray caps
               touch the viewBox edge exactly at rest, so the cursor
               jiggle and the sunrise overshoot carry them across it,
               and a 24x24 rect sliced every crossing tip flat — the
               rays bounced off an invisible box. Jiggle travel tops
               out around 1.5 units; 3 is a comfortable margin.
               The bite circle waits off the right edge at cx=36, its
               hole clear of the widened rect so it can't clip the
               right ray even mid-jiggle.
               The bite is nearly as big as the swollen disc (r=9 vs
               r=10.5) on purpose: crescent thickness is what's LEFT
               between two circle edges, so a small bite can only carve
               a fat stub — a slim crescent needs a near-twin circle
               shifted slightly off center. -->
          <rect x="-3" y="-3" width="30" height="30" fill="white" />
          <circle class="bite" cx="36" cy="10.5" r="9" fill="black" />
        </mask>

        <!-- One mask over the whole drawing, and the rays BEFORE the
             disc so they render underneath it. Both choices serve the
             swallow: rays shrinking toward the center slip in behind
             the disc (same color, so the overlap is invisible), and
             the mask makes sure the bite's hole doesn't become a
             window that shows the swallowed rays hiding inside. -->
        <g mask="url(#crescent-mask)">
          <g class="rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1"     x2="12"    y2="3" />
            <line x1="12" y1="21"    x2="12"    y2="23" />
            <line x1="1"  y1="12"    x2="3"     y2="12" />
            <line x1="21" y1="12"    x2="23"    y2="12" />
            <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36" />
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22" />
          </g>

          <circle class="disc" cx="12" cy="12" r="6" fill="currentColor" />
        </g>

        <!-- Two tiny stars for the moon's sky. These coordinates are
             their SKY positions, in the hollow the bite carves out;
             at rest CSS translates them home, inside the crescent's
             flesh, where they hide ink-on-ink. They live OUTSIDE the
             masked group on purpose: the hollow is exactly where the
             mask punches the drawing away, so inside the group they'd
             be erased too. -->
        <g class="stars" fill="currentColor">
          <!-- Each star sits in a .star-jig group because the cursor
               physics (the script below) shakes the WRAPPER, while the
               star's own transform belongs to the flight in and out of
               the crescent — nested transforms compose instead of
               fighting over one property. -->
          <g class="star-jig"><circle class="star star-1" cx="18.6" cy="7.2" r="0.9" /></g>
          <g class="star-jig"><circle class="star star-2" cx="20.8" cy="12.6" r="0.6" /></g>
        </g>
      </svg>
    </button>

    <!-- aria-hidden: the button's label already tells the whole story;
         announcing this too would say everything twice. -->
    <p class="sky-label" aria-hidden="true">sun</p>
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.querySelector(".sky-toggle");
    const label = document.querySelector(".sky-label");

    /* One source of truth: the theme decides the pose, never the other
       way around. The icon just reads data-theme and dresses to match. */
    function syncPose() {
      const isMoon = root.dataset.theme === "dark";
      toggle.classList.toggle("is-moon", isMoon);
      toggle.setAttribute("aria-pressed", String(isMoon));
      label.textContent = isMoon ? "moon" : "sun";
    }

    /* The icon leads, the world follows one frame later. Flipping
       data-theme restyles and repaints the WHOLE page in one go, and on
       a phone that stall is long enough that the rays' 170ms plunge —
       the only leg of the morph that starts at 0ms — lost its opening
       frames and read as a blink. So the tap only starts the icon's
       morph (cheap: one small svg), lets the browser paint that first
       frame, and flips the theme on the one after. The sky still moves
       with the sun — 16ms is far below what the eye can order — but
       the stall now lands with the plunge already visibly in motion. */
    let flipFrame;
    let labelTimer;
    toggle.addEventListener("click", () => {
      /* localStorage, not root.dataset, is the source of truth for
         "current theme" here: with the world-flip deferred a frame, a
         fast second tap could otherwise read the OLD theme back and
         cancel itself out. */
      const next =
        (localStorage.getItem("theme") || root.dataset.theme) === "dark"
          ? "light" : "dark";
      localStorage.setItem("theme", next);

      const isMoon = next === "dark";
      toggle.classList.toggle("is-moon", isMoon);
      toggle.setAttribute("aria-pressed", String(isMoon));

      cancelAnimationFrame(flipFrame);
      flipFrame = requestAnimationFrame(() => {
        /* two rAFs, not one: the first fires BEFORE this frame paints,
           so the flip would land in the same paint as the morph's
           start; the second lands it cleanly in the frame after */
        flipFrame = requestAnimationFrame(() => {
          root.dataset.theme = next;
        });
      });

      /* The word changes when the shape does: the crescent bite lands /
         the rays return around the 150ms mark, so the caption switches
         just before that, no fade needed. */
      clearTimeout(labelTimer);
      labelTimer = setTimeout(() => {
        label.textContent = isMoon ? "moon" : "sun";
      }, 130);
    });

    /* If you arrive in dark mode, wake up as the moon. This runs before
       the first paint, so the pose is applied without playing the morph
       — you only see the animation when YOU flip the sky. */
    syncPose();

    function settleSkyTransitions() {
      document.getAnimations().forEach((anim) => {
        if (anim.transitionProperty) anim.cancel();
      });
    }

    /* Stop the morph before the document is frozen. Repairing it only
       after a back/forward-cache restore is too late in Chromium-based
       browsers: the first restored frame may still carry the old border,
       label color, or icon pose. The deferred world-flip must land too:
       rAF callbacks never fire in a hidden document, so a tap taken in
       the instant before hiding would otherwise leave the sky in the
       old theme with the icon already morphed. */
    function prepareSkyForSuspension() {
      clearTimeout(labelTimer);
      cancelAnimationFrame(flipFrame);
      root.dataset.theme = localStorage.getItem("theme") || root.dataset.theme;
      settleSkyTransitions();
    }

    window.addEventListener("pagehide", prepareSkyForSuspension);

    /* Re-sync first, then cancel. Changing the theme and .is-moon class
       can create fresh transitions of its own, and those must also land
       immediately when the page is being restored. */
    window.addEventListener("pageshow", () => {
      clearTimeout(labelTimer);
      root.dataset.theme = localStorage.getItem("theme") || root.dataset.theme;
      syncPose();
      settleSkyTransitions();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        prepareSkyForSuspension();
        return;
      }

      root.dataset.theme = localStorage.getItem("theme") || root.dataset.theme;
      syncPose();
      settleSkyTransitions();
    });

    /* --- Cursor jiggle ----------------------------------------------------
       The rays and stars aren't wired to a canned hover animation —
       each one is a tiny spring-mounted body the cursor physically
       brushes. Moving the mouse near a part flicks it in the direction
       the cursor is travelling; a damped spring then pulls it home,
       overshooting a little on the way. Hold the mouse still and
       nothing moves: the jiggle IS your hand's motion, echoed.

       Everything works in viewBox units (the icon is 24 units across,
       3px each on screen) so the numbers below stay meaningful next to
       the svg coordinates. */

    const icon = document.querySelector(".sky-icon");

    /* One entry per springy part: the element that takes the transform,
       its rest position (where the cursor's distance is measured), and
       which sky it belongs to — rays answer by day, stars by night, so
       the swallowed rays can't shiver invisibly inside the moon.
       The stars enter through their WRAPPER group: a star's own
       transform belongs to the morph's flight, and nested transforms
       compose instead of fighting over one property. */
    const parts = [];

    for (const line of icon.querySelectorAll(".rays line")) {
      parts.push({
        el: line,
        cx: (+line.getAttribute("x1") + +line.getAttribute("x2")) / 2,
        cy: (+line.getAttribute("y1") + +line.getAttribute("y2")) / 2,
        moon: false,
        x: 0, y: 0, vx: 0, vy: 0,
      });
    }

    for (const jig of icon.querySelectorAll(".star-jig")) {
      const star = jig.querySelector(".star");
      parts.push({
        el: jig,
        cx: +star.getAttribute("cx"),
        cy: +star.getAttribute("cy"),
        moon: true,
        x: 0, y: 0, vx: 0, vy: 0,
      });
    }

    /* A shake is a uniform force field — identical kicks would march
       every part in lockstep, which reads as the icon sliding around,
       not parts rattling in place. A fixed per-part "mass" desyncs
       them: lighter parts fly a little further on the same jolt. */
    for (const part of parts) part.gain = 0.75 + Math.random() * 0.5;

    const REACH = 4;       // influence radius around a part, in units
    const FLICK = 6;       // how much of the cursor's motion transfers
    const STIFFNESS = 520; // spring pull toward home (1/s²)
    const DAMPING = 11;    // low enough that the return overshoots (1/s)
    const V_MAX = 32;      // units/s — a wild swipe can't launch a part
    const SHAKE = 24;      // units/s of part speed per m/s² of phone jolt —
                           // strong enough that a real shake saturates V_MAX
                           // within a few jolts, whatever rhythm the hand
                           // picks; the cap is what actually sets the size
    const SHAKE_MIN = 2;   // m/s² — below this the phone is just being held
    /* You can't watch the parts rattle while your own hand is shaking
       the screen — eyes and phone move together, and the wobble only
       shows up in recordings. So the show is the RING-DOWN: while jolts
       arrive (and for a beat after) the springs run much looser, so the
       parts swing big and keep visibly trembling for a second after the
       hand stops, before the normal damping calms them again. */
    const RING_DAMPING = 4; // loose springs while shaken (vs DAMPING at rest)
    const RING = 1200;      // ms the looseness outlives the last jolt

    let pointer = null; // last cursor spot, in viewBox units
    let touchId = null; // the one finger standing in for the cursor

    /* On a phone the finger IS the cursor — the same contract as the
       homepage title: pressing the button starts the trail under the
       fingertip, dragging brushes the parts exactly like cursor motion,
       lifting lets the springs settle home. A plain tap still flips the
       sky: the browser only fires click when the finger didn't really
       travel, so the two gestures never collide. Touch pointers are
       implicitly captured on pointerdown, so a drag that wanders off
       the button keeps brushing until it lifts (or the scroll takes it
       via pointercancel — pan-y above hands it only vertical swipes). */
    toggle.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "touch" || touchId !== null) return;
      touchId = e.pointerId;
      const r = icon.getBoundingClientRect();
      const unit = r.width / 24;
      pointer = { x: (e.clientX - r.left) / unit, y: (e.clientY - r.top) / unit };
    });

    function lift(e) {
      if (e.pointerId !== touchId) return;
      touchId = null;
      pointer = null; // parts already in motion just spring home
    }
    toggle.addEventListener("pointerup", lift);
    toggle.addEventListener("pointercancel", lift);

    /* Listening on the whole button, not just the 72px icon: REACH
       extends past the icon's edge, so a ray should already stir as
       the cursor closes in on it from the surrounding paper. */
    let lastZoom = devicePixelRatio;
    toggle.addEventListener("pointermove", (e) => {
      /* touch brushes only while the followed finger is down; the
         cursor brushes freely — the physics below is shared */
      if (e.pointerType === "touch" && e.pointerId !== touchId) return;
      /* remeasure every move — the button itself drifts 2px upward on
         hover, so a cached rect would smear every coordinate */
      const r = icon.getBoundingClientRect();
      const unit = r.width / 24;
      const p = { x: (e.clientX - r.left) / unit, y: (e.clientY - r.top) / unit };

      /* Ctrl+scroll zoom rescales the page under a stationary cursor,
         and the browser then fires one synthetic move so hover state
         catches up. Relative to the icon that reads as the hand
         teleporting — one giant delta per wheel notch — and the kick
         slammed whatever the cursor landed next to (by night the
         stars, rattled out of their sky on every notch). Zoom is the
         only thing that changes devicePixelRatio, so when it moves,
         drop the trail — the same cure as leaving: the kick below
         skips, and the last line reseeds from the new coordinates. */
      if (devicePixelRatio !== lastZoom) {
        lastZoom = devicePixelRatio;
        pointer = null;
      }

      if (pointer) {
        const dx = p.x - pointer.x;
        const dy = p.y - pointer.y;
        const isMoon = toggle.classList.contains("is-moon");

        for (const part of parts) {
          if (part.moon !== isMoon) continue;
          const d = Math.hypot(p.x - part.cx, p.y - part.cy);
          if (d >= REACH) continue;

          /* smooth falloff: full strength on the part, zero at REACH */
          const f = 1 - (d / REACH) ** 2;
          part.vx += dx * FLICK * f;
          part.vy += dy * FLICK * f;

          const v = Math.hypot(part.vx, part.vy);
          if (v > V_MAX) {
            part.vx *= V_MAX / v;
            part.vy *= V_MAX / v;
          }
        }
        wake();
      }
      pointer = p;
    });

    toggle.addEventListener("pointerleave", () => {
      /* forget the trail so re-entry doesn't read as one giant delta;
         parts already in motion just spring home on their own */
      pointer = null;
    });

    /* Scrolling has the same teleport problem as zoom: each wheel
       notch slides the icon ~100px under a stationary cursor and the
       browser's catch-up move would land as one giant kick. The page
       only scrolls when zoomed in, which is exactly when it happens
       right next to the icon. Same cure as leaving: drop the trail.
       (Touch is unaffected — a scrolling finger already exits through
       pointercancel, which clears the trail on its own.) */
    window.addEventListener("scroll", () => {
      pointer = null;
    }, { passive: true });

    /* --- Shaking the phone ------------------------------------------------
       The same springs answer the accelerometer: jolt the phone and the
       mounted parts lag behind it, then get pulled home — the pseudo-
       force of the phone's own acceleration, fed in as velocity kicks.
       Day picks the rays, night the stars, same rule as the cursor.
       Mapped for portrait (device x runs along screen x; device y
       points UP the screen, so it flips): this is a phone flourish,
       and phones hold the lab upright. Motion sensors only exist on
       secure origins, and iOS additionally wants a permission prompt
       we won't show for an easter egg — in practice this is Android
       over HTTPS, and anywhere else the listener never hears a thing. */
    let ringUntil = 0; // while now < this, tick runs the loose springs

    if (isSecureContext) {
      window.addEventListener("devicemotion", (e) => {
        const a = e.acceleration; // gravity already subtracted
        if (!a || a.x === null) return;
        if (Math.hypot(a.x, a.y) < SHAKE_MIN) return; // held, not shaken
        ringUntil = performance.now() + RING;
        /* interval is the sensor's sampling period, in MILLISECONDS */
        const dt = e.interval > 0 && e.interval < 100 ? e.interval / 1000 : 0.016;
        const isMoon = toggle.classList.contains("is-moon");
        for (const part of parts) {
          if (part.moon !== isMoon) continue;
          /* the phone jerks one way, the parts lag the other */
          part.vx += -a.x * SHAKE * part.gain * dt;
          part.vy += a.y * SHAKE * part.gain * dt;
          const v = Math.hypot(part.vx, part.vy);
          if (v > V_MAX) {
            part.vx *= V_MAX / v;
            part.vy *= V_MAX / v;
          }
        }
        wake();
      });
    }

    let rafId = null;
    let lastT = 0;

    function wake() {
      if (rafId === null) {
        lastT = performance.now();
        rafId = requestAnimationFrame(tick);
      }
    }

    function tick(t) {
      /* clamp dt so a throttled background tab can't slingshot a part */
      const dt = Math.min((t - lastT) / 1000, 0.032);
      lastT = t;

      /* shaken springs ring loose; everything else gets the tight ones */
      const damping = t < ringUntil ? RING_DAMPING : DAMPING;

      let alive = false;
      for (const part of parts) {
        /* semi-implicit Euler: update velocity from the spring force
           and friction FIRST, then move — stabler than the naive order */
        part.vx += (-STIFFNESS * part.x - damping * part.vx) * dt;
        part.vy += (-STIFFNESS * part.y - damping * part.vy) * dt;
        part.x += part.vx * dt;
        part.y += part.vy * dt;

        if (Math.hypot(part.x, part.y) > 0.002 || Math.hypot(part.vx, part.vy) > 0.05) {
          alive = true;
          /* px inside svg = user units, so these ARE viewBox units */
          part.el.style.transform = `translate(${part.x}px, ${part.y}px)`;
        } else if (part.el.style.transform) {
          /* settled: snap off the residue and stop touching the style */
          part.x = part.y = part.vx = part.vy = 0;
          part.el.style.transform = "";
        }
      }

      rafId = alive ? requestAnimationFrame(tick) : null;
    }
  </script>
  <script src="../../scripts/haptics.js"></script>
