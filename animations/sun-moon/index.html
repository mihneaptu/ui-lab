<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sun to moon · mihneaptu/lab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Sets the theme BEFORE the page paints, so there's no flash of the
       wrong colors. Your last choice wins; otherwise the OS preference. -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>

  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/base.css">

  <style>
    /* A single specimen, centered on the page like an exhibit. */
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-8) var(--space-6) var(--space-6);
      /* The sky doesn't snap to night — the paper crossfades on the
         morph's own clock, so the world changes WITH the sun, not
         before it. */
      transition: background-color 500ms ease;
    }

    .sky-specimen {
      display: grid;
      justify-items: center;
      row-gap: var(--space-5);
    }

    /* --- The toggle ------------------------------------------------------
       A round button that holds the icon — styled like a piece of lab
       chrome (surface, hairline border), not like the primary .btn. */

    .sky-toggle {
      /* The morph's shared clock. One ease for everything keeps the
         disc, rays, and mask feeling like a single object transforming
         instead of three animations that happen to run at once.
         A symmetric ease-in-out, NOT an exponential ease-out: an
         exponential curve finishes ~70% of the travel in the first
         tenth of a second, so the rays looked like they blinked out
         rather than plunged in. This curve spends its speed in the
         middle, where the eye can actually watch the parts travel. */
      --sky-ease: cubic-bezier(0.65, 0, 0.35, 1);
      --sky-time: 400ms;

      position: relative; /* anchors the dot-grid layer below */
      width: 176px;
      height: 176px;
      display: grid;
      place-items: center;
      color: var(--ink); /* the svg draws with currentColor */
      background-color: var(--surface);
      border: 1px solid var(--line);
      border-radius: 50%;
      /* md at rest, not sm: at 176px the chip-sized shadow reads as
         "pasted on"; a big object needs a shadow that matches its size
         to look like it's resting on the paper */
      box-shadow: var(--shadow-md);
      cursor: pointer;
      /* only the press stays on the fast micro-feedback clock; border,
         surface, ink, AND shadow all ride the same slow crossfade as
         the paper. Anything on a faster clock flips to the new theme
         ahead of the surface and draws attention to itself — the
         border did exactly that (a bright ring around the still-dark
         circle), and the shadow bloom on hover reads better slow too:
         light shifting over an object, not a control lighting up. */
      transition: transform 180ms cubic-bezier(0.2, 0, 0, 1),
                  box-shadow 500ms ease,
                  background-color 500ms ease,
                  border-color 500ms ease,
                  color 500ms ease;
    }

    /* The dot grid lives on its own layer because a background-image
       can't transition — the dots were snapping to the new theme while
       everything else faded. The trick: this layer is a plain solid
       color (which CAN transition), and a mask punches the dot pattern
       out of it. The mask never changes; only the color crossfades,
       on the same 500ms clock as everything else. */
    .sky-toggle::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-color: var(--line);
      -webkit-mask-image: radial-gradient(#000 1px, transparent 1px);
      -webkit-mask-size: 14px 14px;
      mask-image: radial-gradient(#000 1px, transparent 1px);
      mask-size: 14px 14px;
      transition: background-color 500ms ease;
      pointer-events: none;
    }

    /* position: relative lifts the icon above the dot layer (positioned
       pseudo-elements paint over static children otherwise) */
    .sky-icon {
      position: relative;
    }

    /* Hover: a gentle 2px rise with the shadow deepening one step —
       the object floating up to meet the cursor, not a control
       lighting up. (The rise is on a quick 180ms clock; the shadow
       blooms slowly behind it.) */
    .sky-toggle:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    /* Pressing the sky: the rise collapses and the button gives
       slightly under the finger, like a physical switch. */
    .sky-toggle:active {
      transform: scale(0.97);
    }

    .sky-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* --- The icon --------------------------------------------------------
       One svg, three moving parts:

         .disc — the sun's body, a filled circle.
         .rays — eight short lines around it.
         .bite — an invisible circle inside a <mask>, parked off-canvas.

       The moon is never drawn. It's what's LEFT of the sun's disc after
       the bite slides over it: the mask's white rectangle keeps the disc
       visible, and wherever the black bite circle overlaps, the disc is
       punched out. Slide the bite across one edge and a crescent remains. */

    .sky-icon {
      width: 72px;
      height: 72px;
      /* the sunrise overshoot pokes the ray caps a hair past the
         viewBox — let them, instead of clipping them flat */
      overflow: visible;
    }

    /* transform-box: view-box makes "center" mean the middle of the
       24x24 viewBox (12,12) — the point the disc grows from and the
       rays rotate around. Without it, each line would use its own
       tiny bounding box and the rays would spin in place. */
    .disc,
    .rays {
      transform-box: view-box;
      transform-origin: center;
    }

    /* The three parts share one clock and one ease but start staggered,
       so each motion hands off to the next and the whole thing reads
       as ONE object transforming. The delays below are the moon→sun
       direction (the crescent heals, the disc shrinks, the rays climb
       back out last); the .is-moon block flips the order. */

    .bite {
      transition: transform var(--sky-time) var(--sky-ease);
    }

    .disc {
      transition: transform var(--sky-time) var(--sky-ease) 40ms;
    }

    /* The rays run on a slightly quicker clock than the other parts.
       This is what lets everything play AT THE SAME TIME: the bite's
       hole sweeps right through the space the right ray is retreating
       from, so the rays must always be one step ahead of it — faster,
       not earlier, keeps the whole morph simultaneous.
       Their ease has a small overshoot: at sunrise the rays stretch a
       hair past resting length and settle back — arrival with weight,
       not interpolation. (Going to the moon the same overshoot lands
       inside the disc, where nobody sees it.) */
    .rays {
      transition: transform calc(var(--sky-time) - 80ms)
                  cubic-bezier(0.34, 1.3, 0.64, 1) 140ms;
    }

    /* --- The moon state --------------------------------------------------
       Sun → moon: the rays plunge inward and are swallowed by the
       swelling disc, then the bite slides in from the top-right to
       carve the crescent. Going back, the disc heals and shrinks, and
       the rays climb back out of it. */

    .sky-toggle.is-moon .rays {
      /* No fade: the rays are drawn UNDER the disc in the same color,
         so shrinking them toward the center makes the swelling disc
         swallow them whole. The rotation turns the plunge into a
         turn of the sky — clockwise, sweeping toward the hollow the
         bite is about to carve. (scale 0.25 parks them well inside
         r=6, safely covered even before the disc finishes growing.) */
      transform: rotate(45deg) scale(0.25);
      transition-duration: 170ms;
      transition-delay: 0ms; /* the rays lead going to the moon... */
    }

    .sky-toggle.is-moon .disc {
      /* r=6 scaled 1.75x reads as a proper moon; still inside the box.
         The stretched clock is deliberate: the swell must OUTLAST the
         bite (which runs 85-325ms), so the crescent is carved out of
         a body that's visibly still growing — grow-and-carve as one
         event, not grow, stop, carve. */
      transform: scale(1.75);
      transition-duration: 360ms;
      transition-delay: 25ms; /* ...the disc swells as they sink in... */
    }

    .sky-toggle.is-moon .bite {
      /* Parked at cx=33, this lands the bite at (17.3,10.5) — about
         5.5 units off the disc's center, leaving a crescent ~7 units
         thick that opens toward the top-right.
         The 85ms holds the bite until the rays are most of the way
         home — otherwise its notch appears on the right rim while the
         LEFT rays still have the longest journey ahead, and the right
         side visibly wins the race. Rays land, then the carve sweeps. */
      transform: translate(-15.7px, 0);
      transition-duration: 240ms;
      transition-delay: 85ms;
    }

    /* Going back (moon → sun) the base rules above already reverse
       everything; the 60ms delay on .rays means the crescent heals
       first and the rays pop out a beat later. */

    /* --- The stars --------------------------------------------------------
       The payoff: once the crescent has settled, two small stars fly
       out of it into the hollow it carved — and when day returns they
       dive back in, eaten by the moon. No opacity tricks: their HOME
       position is tucked inside the crescent's flesh, where ink on ink
       is simply invisible (the same trick that hides the swallowed
       rays). The spot is chosen to sit inside the small sun disc too,
       so they stay hidden in daylight as well. */

    .star {
      transform-box: fill-box;
      transform-origin: center;
      /* return flight: dive back into the moon right away */
      transition: transform 280ms var(--sky-ease);
    }

    .star-1 {
      opacity: 0.9;
      transform: translate(-11.2px, 5.8px) scale(0.8);
    }

    .star-2 {
      opacity: 0.7; /* a touch dimmer — reads as farther away */
      transform: translate(-12.9px, 1.6px) scale(0.8);
    }

    /* Night falls: the moon releases its stars while the crescent is
       still being carved — they launch invisible over its flesh, and
       the sweeping bite uncovers them mid-flight. Staggered so they read as two arrivals, and on
       a springy ease so they POP into place — a touch past their spot,
       then settle, like something small coming to rest. */
    .sky-toggle.is-moon .star {
      transform: none;
      /* the launch rides the faster nightfall clock, same ~60% tempo
         as the rest of the sun-to-moon morph */
      transition-duration: 170ms;
      transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sky-toggle.is-moon .star-1 {
      transition-delay: 145ms;
    }

    .sky-toggle.is-moon .star-2 {
      transition-delay: 195ms;
    }

    /* --- Caption ---------------------------------------------------------
       Quiet mono metadata under the exhibit, like a specimen label. */

    .sky-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--ink-muted);
      user-select: none;
      /* No slow color fade here: the word swaps early in the morph
         (100ms). The color flip must be DONE before that — CSS
         transitions and setTimeout run on different clocks, and if
         they aim at the same instant the swap can land a frame early,
         flashing the new word in the old ink. Finishing at 80ms
         leaves a safe gap. */
      transition: color 80ms ease;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../../index.html">&larr; back</a>

  <main class="sky-specimen">
    <!-- Not just a demo: this button is the page's real theme switch.
         Sun = light theme, moon = dark theme, saved the same way the
         header toggle on other pages saves it (localStorage), so the
         choice follows you around the lab. -->
    <button
      class="sky-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Switch color theme"
    >
      <svg class="sky-icon" viewBox="0 0 24 24" aria-hidden="true">
        <mask id="crescent-mask">
          <!-- White = keep, black = punch out. The rect keeps the whole
               drawing; the bite circle waits off the right edge — far
               enough out (cx=33) that its hole can't clip the right
               ray, which the mask now covers too.
               The bite is nearly as big as the swollen disc (r=9 vs
               r=10.5) on purpose: crescent thickness is what's LEFT
               between two circle edges, so a small bite can only carve
               a fat stub — a slim crescent needs a near-twin circle
               shifted slightly off center. -->
          <rect x="0" y="0" width="24" height="24" fill="white" />
          <circle class="bite" cx="33" cy="10.5" r="9" fill="black" />
        </mask>

        <!-- One mask over the whole drawing, and the rays BEFORE the
             disc so they render underneath it. Both choices serve the
             swallow: rays shrinking toward the center slip in behind
             the disc (same color, so the overlap is invisible), and
             the mask makes sure the bite's hole doesn't become a
             window that shows the swallowed rays hiding inside. -->
        <g mask="url(#crescent-mask)">
          <g class="rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1"     x2="12"    y2="3" />
            <line x1="12" y1="21"    x2="12"    y2="23" />
            <line x1="1"  y1="12"    x2="3"     y2="12" />
            <line x1="21" y1="12"    x2="23"    y2="12" />
            <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36" />
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22" />
          </g>

          <circle class="disc" cx="12" cy="12" r="6" fill="currentColor" />
        </g>

        <!-- Two tiny stars for the moon's sky. These coordinates are
             their SKY positions, in the hollow the bite carves out;
             at rest CSS translates them home, inside the crescent's
             flesh, where they hide ink-on-ink. They live OUTSIDE the
             masked group on purpose: the hollow is exactly where the
             mask punches the drawing away, so inside the group they'd
             be erased too. -->
        <g class="stars" fill="currentColor">
          <!-- Each star sits in a .star-jig group because the cursor
               physics (the script below) shakes the WRAPPER, while the
               star's own transform belongs to the flight in and out of
               the crescent — nested transforms compose instead of
               fighting over one property. -->
          <g class="star-jig"><circle class="star star-1" cx="18.6" cy="7.2" r="0.9" /></g>
          <g class="star-jig"><circle class="star star-2" cx="20.8" cy="12.6" r="0.6" /></g>
        </g>
      </svg>
    </button>

    <!-- aria-hidden: the button's label already tells the whole story;
         announcing this too would say everything twice. -->
    <p class="sky-label" aria-hidden="true">sun</p>
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.querySelector(".sky-toggle");
    const label = document.querySelector(".sky-label");

    /* One source of truth: the theme decides the pose, never the other
       way around. The icon just reads data-theme and dresses to match. */
    function syncPose() {
      const isMoon = root.dataset.theme === "dark";
      toggle.classList.toggle("is-moon", isMoon);
      toggle.setAttribute("aria-pressed", String(isMoon));
      label.textContent = isMoon ? "moon" : "sun";
    }

    /* The word changes when the shape does: ~200ms into the 400ms morph
       the crescent bite lands (going dark) / the rays are back (going
       light), so that's the frame where the icon stops being the old
       body — and the caption switches with it, no fade needed. */
    let labelTimer;
    toggle.addEventListener("click", () => {
      root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
      localStorage.setItem("theme", root.dataset.theme);

      const isMoon = root.dataset.theme === "dark";
      toggle.classList.toggle("is-moon", isMoon);
      toggle.setAttribute("aria-pressed", String(isMoon));

      clearTimeout(labelTimer);
      labelTimer = setTimeout(() => {
        label.textContent = isMoon ? "moon" : "sun";
      }, 100);
    });

    /* If you arrive in dark mode, wake up as the moon. This runs before
       the first paint, so the pose is applied without playing the morph
       — you only see the animation when YOU flip the sky. */
    syncPose();

    /* --- Cursor jiggle ----------------------------------------------------
       The rays and stars aren't wired to a canned hover animation —
       each one is a tiny spring-mounted body the cursor physically
       brushes. Moving the mouse near a part flicks it in the direction
       the cursor is travelling; a damped spring then pulls it home,
       overshooting a little on the way. Hold the mouse still and
       nothing moves: the jiggle IS your hand's motion, echoed.

       Everything works in viewBox units (the icon is 24 units across,
       3px each on screen) so the numbers below stay meaningful next to
       the svg coordinates. */

    const icon = document.querySelector(".sky-icon");

    /* One entry per springy part: the element that takes the transform,
       its rest position (where the cursor's distance is measured), and
       which sky it belongs to — rays answer by day, stars by night, so
       the swallowed rays can't shiver invisibly inside the moon.
       The stars enter through their WRAPPER group: a star's own
       transform belongs to the morph's flight, and nested transforms
       compose instead of fighting over one property. */
    const parts = [];

    for (const line of icon.querySelectorAll(".rays line")) {
      parts.push({
        el: line,
        cx: (+line.getAttribute("x1") + +line.getAttribute("x2")) / 2,
        cy: (+line.getAttribute("y1") + +line.getAttribute("y2")) / 2,
        moon: false,
        x: 0, y: 0, vx: 0, vy: 0,
      });
    }

    for (const jig of icon.querySelectorAll(".star-jig")) {
      const star = jig.querySelector(".star");
      parts.push({
        el: jig,
        cx: +star.getAttribute("cx"),
        cy: +star.getAttribute("cy"),
        moon: true,
        x: 0, y: 0, vx: 0, vy: 0,
      });
    }

    const REACH = 4;       // influence radius around a part, in units
    const FLICK = 6;       // how much of the cursor's motion transfers
    const STIFFNESS = 520; // spring pull toward home (1/s²)
    const DAMPING = 11;    // low enough that the return overshoots (1/s)
    const V_MAX = 32;      // units/s — a wild swipe can't launch a part

    let pointer = null; // last cursor spot, in viewBox units

    /* Listening on the whole button, not just the 72px icon: REACH
       extends past the icon's edge, so a ray should already stir as
       the cursor closes in on it from the surrounding paper. */
    toggle.addEventListener("pointermove", (e) => {
      /* remeasure every move — the button itself drifts 2px upward on
         hover, so a cached rect would smear every coordinate */
      const r = icon.getBoundingClientRect();
      const unit = r.width / 24;
      const p = { x: (e.clientX - r.left) / unit, y: (e.clientY - r.top) / unit };

      if (pointer) {
        const dx = p.x - pointer.x;
        const dy = p.y - pointer.y;
        const isMoon = toggle.classList.contains("is-moon");

        for (const part of parts) {
          if (part.moon !== isMoon) continue;
          const d = Math.hypot(p.x - part.cx, p.y - part.cy);
          if (d >= REACH) continue;

          /* smooth falloff: full strength on the part, zero at REACH */
          const f = 1 - (d / REACH) ** 2;
          part.vx += dx * FLICK * f;
          part.vy += dy * FLICK * f;

          const v = Math.hypot(part.vx, part.vy);
          if (v > V_MAX) {
            part.vx *= V_MAX / v;
            part.vy *= V_MAX / v;
          }
        }
        wake();
      }
      pointer = p;
    });

    toggle.addEventListener("pointerleave", () => {
      /* forget the trail so re-entry doesn't read as one giant delta;
         parts already in motion just spring home on their own */
      pointer = null;
    });

    let rafId = null;
    let lastT = 0;

    function wake() {
      if (rafId === null) {
        lastT = performance.now();
        rafId = requestAnimationFrame(tick);
      }
    }

    function tick(t) {
      /* clamp dt so a throttled background tab can't slingshot a part */
      const dt = Math.min((t - lastT) / 1000, 0.032);
      lastT = t;

      let alive = false;
      for (const part of parts) {
        /* semi-implicit Euler: update velocity from the spring force
           and friction FIRST, then move — stabler than the naive order */
        part.vx += (-STIFFNESS * part.x - DAMPING * part.vx) * dt;
        part.vy += (-STIFFNESS * part.y - DAMPING * part.vy) * dt;
        part.x += part.vx * dt;
        part.y += part.vy * dt;

        if (Math.hypot(part.x, part.y) > 0.002 || Math.hypot(part.vx, part.vy) > 0.05) {
          alive = true;
          /* px inside svg = user units, so these ARE viewBox units */
          part.el.style.transform = `translate(${part.x}px, ${part.y}px)`;
        } else if (part.el.style.transform) {
          /* settled: snap off the residue and stop touching the style */
          part.x = part.y = part.vx = part.vy = 0;
          part.el.style.transform = "";
        }
      }

      rafId = alive ? requestAnimationFrame(tick) : null;
    }
  </script>
  <script src="../../scripts/haptics.js"></script>

</body>
</html>
