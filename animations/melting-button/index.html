<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melting button · ui-lab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Sets the theme BEFORE the page paints, so there's no flash of the
       wrong colors. Your last choice wins; otherwise the OS preference. -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>

  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="buttons.css">

  <style>
    /* A centered comparison stage with room for the fixed back link. */
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-8) var(--space-6) var(--space-6);
    }

    .melt-comparison {
      width: min(720px, calc(100vw - 64px));
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: var(--space-8);
      align-items: start;
    }

    .melt-specimen {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 160px;
      row-gap: var(--space-5);
      text-align: center;
    }

    .melt-title {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
    }

    .melt-slot {
      height: 160px;
      display: grid;
      place-items: center;
    }

    @media (max-width: 640px) {
      .melt-comparison {
        width: min(320px, calc(100vw - 64px));
        grid-template-columns: minmax(0, 1fr);
        row-gap: var(--space-7);
      }
    }

    /* --- The melt --------------------------------------------------------
       Press the button and it turns purple, sags, drips, and blurs away.
       Once melted it's removed from the page — refresh to pour a new one.
       This is a page experiment, so the purple lives here, not in tokens. */

    :root { --melt: #7c3aed; }
    [data-theme="dark"] { --melt: #a78bfa; }

    /* Three acts, chained by animation-delay:
         1. infect — purple creeps down from the top edge, slowly (0–2s)
         2. drip   — once it reaches the bottom, drops break off (1.7s–3s)
         3. melt   — the fully infected button quietly fades out (2.6–3.4s)
       When "melt" ends, the script removes the button. */

    .btn.is-melting {
      position: relative;   /* anchors the drips below */
      pointer-events: none; /* one melt per button — no double clicks */

      /* The infection is a purple layer painted ON TOP of the button's own
         color, pinned to the top edge with a short soft front. Growing its
         background-size from 0% downward is what makes it "spread". */
      background-image: linear-gradient(to bottom, var(--melt) 90%, transparent);
      background-repeat: no-repeat;
      background-position: top;
      background-size: 100% 0%;

      animation:
        infect 2s ease-in forwards,
        melt 0.8s ease-out 2.6s forwards;
    }

    @keyframes infect {
      /* The button's own color also turns purple at the very end of the
         sweep, so no pale edges survive under the gradient or the border.
         140% (not 100%) size lets the soft front travel past the bottom. */
      70%  { background-color: var(--accent); }
      100% { background-color: var(--melt); background-size: 100% 140%; }
    }

    @keyframes melt {
      to { opacity: 0; }
    }

    /* Two purple drops that break off once the infection reaches the bottom */
    .btn.is-melting::before,
    .btn.is-melting::after {
      content: "";
      position: absolute;
      top: 96%;
      width: 10px;
      height: 12px;
      border-radius: 50%;
      background: var(--melt);
      opacity: 0; /* invisible until their (delayed) animation starts */
      animation: drip 1.1s ease-in forwards;
    }

    .btn.is-melting::before {
      left: 22%;
      animation-delay: 1.7s;
    }

    .btn.is-melting::after {
      left: 64%;
      animation-delay: 2s;
      animation-duration: 0.95s;
    }

    @keyframes drip {
      0%   { transform: translateY(-6px) scale(0.4);      opacity: 1; }
      70%  { transform: translateY(48px) scale(1, 1.6);   opacity: 1; }
      100% { transform: translateY(84px) scale(0.7, 1.9); opacity: 0; }
    }
  </style>
</head>
<body>

  <a class="back-link" href="../../index.html">&larr; back</a>

  <main class="melt-comparison" aria-label="Melting button comparison">
    <section class="melt-specimen" aria-labelledby="fable-title">
      <h2 class="melt-title" id="fable-title">Fable 5</h2>
      <div class="melt-slot">
        <button
          class="btn btn-primary btn-md melt-button melt-button--fable"
          type="button"
          data-melt="fable"
          data-terminal-animation="melt"
          data-fallback-ms="3600"
        >Button</button>
      </div>
    </section>

    <section class="melt-specimen" aria-labelledby="sol-title">
      <h2 class="melt-title" id="sol-title">GPT-5.6 Sol</h2>
      <div class="melt-slot">
        <button
          class="btn btn-primary btn-md melt-button melt-button--sol"
          type="button"
          data-melt="sol"
          data-terminal-animation="melt"
          data-fallback-ms="3600"
        >Button</button>
      </div>
    </section>
  </main>

  <script>
    function attachMelt(button) {
      const terminalAnimation = button.dataset.terminalAnimation;
      const fallbackMs = Number(button.dataset.fallbackMs);
      let isMelting = false;
      let removalTimer;

      function removeButton() {
        window.clearTimeout(removalTimer);
        button.remove();
      }

      button.addEventListener("click", () => {
        if (isMelting) return;

        isMelting = true;
        button.setAttribute("aria-disabled", "true");
        button.classList.add("is-melting");
        removalTimer = window.setTimeout(removeButton, fallbackMs);
      });

      button.addEventListener("animationend", (event) => {
        if (
          event.target === button
          && event.animationName === terminalAnimation
        ) {
          removeButton();
        }
      });
    }

    document.querySelectorAll(".melt-button").forEach(attachMelt);
  </script>

</body>
</html>
