<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inertia preview rail · mihneaptu/lab</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Sets the theme BEFORE the page paints, so there's no flash of the
       wrong colors. Your last choice wins; otherwise the OS preference. -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>

  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="styles.css">

  <script src="script.js" defer></script>
</head>
<body>

  <a class="back-link" href="../../index.html">&larr; back</a>

  <main class="rail-specimen">
    <!-- The exhibit needs no visible title, but its outline does: the
         listbox is the page's one landmark, and a main with no h1 is a
         skipped level for anyone navigating by headings. -->
    <h1 class="visually-hidden">Inertia preview rail</h1>

    <!-- A listbox with roving tabindex: arrows move selection AND focus
         together, Home/End jump to the ends. The strip itself is dragged,
         swiped, or wheeled; release hands its measured velocity to one
         spring, which settles the nearest preview into the center. -->
    <div class="rail" data-preview-rail role="listbox"
         aria-label="Abstract previews" aria-orientation="horizontal">
      <div class="rail-track" data-rail-track>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="1" aria-setsize="7"
                tabindex="-1" aria-label="pendulum"
                data-name="pendulum" data-note="momentum, conserved">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <path class="hair" d="M 33.7 43.6 A 18 18 0 0 1 66.3 43.6"
                  vector-effect="non-scaling-stroke"/>
            <path class="hair" d="M 22.8 48.7 A 30 30 0 0 1 77.2 48.7"
                  vector-effect="non-scaling-stroke"/>
            <path class="hair" d="M 11.9 53.7 A 42 42 0 0 1 88.1 53.7"
                  vector-effect="non-scaling-stroke"/>
            <path class="mute" d="M 50 36 L 50 80" stroke-dasharray="2 4"
                  vector-effect="non-scaling-stroke"/>
            <path class="ink" d="M 50 36 L 74.1 70.4" stroke-width="1.5"
                  vector-effect="non-scaling-stroke"/>
            <circle class="solid" cx="74.1" cy="70.4" r="6"/>
            <circle class="solid" cx="50" cy="36" r="2.5"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">01</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="2" aria-setsize="7"
                tabindex="-1" aria-label="strata"
                data-name="strata" data-note="rhythm in layers">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <rect class="solid" x="14" y="23" width="60" height="2"/>
            <rect class="soft"  x="26" y="34" width="48" height="2"/>
            <rect class="solid" x="14" y="45" width="70" height="2"/>
            <rect class="soft"  x="20" y="56" width="34" height="2"/>
            <rect class="accent" x="14" y="67" width="52" height="6"/>
            <rect class="soft"  x="30" y="82" width="44" height="2"/>
            <rect class="solid" x="14" y="93" width="64" height="2"/>
            <rect class="soft"  x="22" y="104" width="38" height="2"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">02</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="3" aria-setsize="7"
                tabindex="-1" aria-label="phase"
                data-name="phase" data-note="two signals, one beat">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <path class="ink" stroke-width="1.5"
                  d="M 10 62 C 17.3 46 22.7 46 30 62 C 37.3 78 42.7 78 50 62
                     C 57.3 46 62.7 46 70 62 C 77.3 78 82.7 78 90 62"
                  vector-effect="non-scaling-stroke"/>
            <path class="mute"
                  d="M 10 62 C 17.3 72 22.7 72 30 62 C 37.3 52 42.7 52 50 62
                     C 57.3 72 62.7 72 70 62 C 77.3 52 82.7 52 90 62"
                  vector-effect="non-scaling-stroke"/>
            <circle class="solid" cx="30" cy="62" r="2"/>
            <circle class="solid" cx="50" cy="62" r="2"/>
            <circle class="solid" cx="70" cy="62" r="2"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">03</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="true" aria-posinset="4" aria-setsize="7"
                tabindex="0" aria-label="halftone"
                data-name="halftone" data-note="density as value">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <g class="solid">
              <circle cx="16" cy="22" r="1.2"/><circle cx="28" cy="22" r="1.7"/>
              <circle cx="40" cy="22" r="2.2"/><circle cx="52" cy="22" r="2.7"/>
              <circle cx="64" cy="22" r="3.2"/><circle cx="76" cy="22" r="3.7"/>
              <circle cx="88" cy="22" r="4.2"/>
              <circle cx="16" cy="36" r="1.2"/><circle cx="28" cy="36" r="1.7"/>
              <circle cx="40" cy="36" r="2.2"/><circle cx="52" cy="36" r="2.7"/>
              <circle cx="64" cy="36" r="3.2"/><circle cx="76" cy="36" r="3.7"/>
              <circle cx="88" cy="36" r="4.2"/>
              <circle cx="16" cy="50" r="1.2"/><circle cx="28" cy="50" r="1.7"/>
              <circle cx="40" cy="50" r="2.2"/><circle cx="52" cy="50" r="2.7"/>
              <circle cx="64" cy="50" r="3.2"/><circle cx="76" cy="50" r="3.7"/>
              <circle cx="88" cy="50" r="4.2"/>
              <circle cx="16" cy="64" r="1.2"/><circle cx="28" cy="64" r="1.7"/>
              <circle cx="40" cy="64" r="2.2"/><circle cx="52" cy="64" r="2.7"/>
              <circle cx="64" cy="64" r="3.2"/><circle cx="76" cy="64" r="3.7"/>
              <circle cx="88" cy="64" r="4.2"/>
              <circle cx="16" cy="78" r="1.2"/><circle cx="28" cy="78" r="1.7"/>
              <circle cx="40" cy="78" r="2.2"/><circle cx="52" cy="78" r="2.7"/>
              <circle cx="64" cy="78" r="3.2"/><circle cx="76" cy="78" r="3.7"/>
              <circle cx="88" cy="78" r="4.2"/>
              <circle cx="16" cy="92" r="1.2"/><circle cx="28" cy="92" r="1.7"/>
              <circle cx="40" cy="92" r="2.2"/><circle cx="52" cy="92" r="2.7"/>
              <circle cx="64" cy="92" r="3.2"/><circle cx="76" cy="92" r="3.7"/>
              <circle cx="88" cy="92" r="4.2"/>
              <circle cx="16" cy="106" r="1.2"/><circle cx="28" cy="106" r="1.7"/>
              <circle cx="40" cy="106" r="2.2"/><circle cx="52" cy="106" r="2.7"/>
              <circle cx="64" cy="106" r="3.2"/><circle cx="76" cy="106" r="3.7"/>
              <circle cx="88" cy="106" r="4.2"/>
            </g>
          </svg>
          <span class="rail-item-no" aria-hidden="true">04</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="5" aria-setsize="7"
                tabindex="-1" aria-label="orbit"
                data-name="orbit" data-note="a path and its traveler">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <circle class="hair" cx="50" cy="62" r="34"
                    vector-effect="non-scaling-stroke"/>
            <circle class="mute" cx="50" cy="62" r="20" stroke-dasharray="1.5 4"
                    vector-effect="non-scaling-stroke"/>
            <path class="ink" stroke-width="2.5"
                  d="M 61.6 30.1 A 34 34 0 0 1 83.5 56.1"
                  vector-effect="non-scaling-stroke"/>
            <rect class="accent" x="74.9" y="39.5" width="6" height="6"/>
            <path class="hair" d="M 50 56 L 50 68 M 44 62 L 56 62"
                  vector-effect="non-scaling-stroke"/>
            <circle class="solid" cx="50" cy="62" r="1.5"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">05</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="6" aria-setsize="7"
                tabindex="-1" aria-label="waveform"
                data-name="waveform" data-note="an amplitude study">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <path class="hair" d="M 10 66 L 90 66"
                  vector-effect="non-scaling-stroke"/>
            <rect class="soft"  x="13.5" y="60" width="5" height="12"/>
            <rect class="solid" x="22"   y="53" width="5" height="26"/>
            <rect class="soft"  x="30.5" y="57" width="5" height="18"/>
            <rect class="solid" x="39"   y="44" width="5" height="44"/>
            <rect class="accent" x="47.5" y="35" width="5" height="62"/>
            <rect class="solid" x="56"   y="49" width="5" height="34"/>
            <rect class="soft"  x="64.5" y="42" width="5" height="48"/>
            <rect class="solid" x="73"   y="56" width="5" height="20"/>
            <rect class="soft"  x="81.5" y="51" width="5" height="30"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">06</span>
        </figure>

        <figure class="rail-item" data-rail-item role="option"
                aria-selected="false" aria-posinset="7" aria-setsize="7"
                tabindex="-1" aria-label="monolith"
                data-name="monolith" data-note="mass and void">
          <svg viewBox="0 0 100 125" aria-hidden="true">
            <path class="hair" d="M 14 98 L 90 98"
                  vector-effect="non-scaling-stroke"/>
            <rect class="solid" x="22" y="34" width="26" height="64"/>
            <rect class="hair" x="56" y="50" width="30" height="30"
                  stroke-width="1.5" vector-effect="non-scaling-stroke"/>
            <path class="hair" d="M 48 66 L 56 66"
                  vector-effect="non-scaling-stroke"/>
            <path class="mute" d="M 71 80 L 71 98" stroke-dasharray="2 3"
                  vector-effect="non-scaling-stroke"/>
            <circle class="soft" cx="86" cy="50" r="1.5"/>
          </svg>
          <span class="rail-item-no" aria-hidden="true">07</span>
        </figure>

      </div>
    </div>

    <p class="rail-meta" data-rail-meta aria-live="polite">
      <span class="rail-meta-no" data-meta-no>04 / 07</span>
      <span class="rail-meta-name" data-meta-name>halftone</span>
      <span class="rail-meta-note" data-meta-note>density as value</span>
    </p>
  </main>

  <script src="../../scripts/haptics.js"></script>

</body>
</html>
