<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mihneaptu/lab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Sets the theme BEFORE the page paints, so there's no flash of the
       wrong colors. Your last choice wins; otherwise the OS preference. -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <!-- Loaded here only to draw the live miniature inside the melting-button card -->
  <link rel="stylesheet" href="animations/melting-button/buttons.css">

  <style>
    /* Layout that only the homepage needs */
    .hero { padding: var(--space-7) 0 var(--space-6); }
  </style>
</head>
<body>

  <div class="container">

    <header class="lab-header">
      <!-- Two quiet links sharing one wordmark: the name goes to GitHub,
           the rest brings you home. No space between them on purpose. -->
      <!-- On hover of the name: the "/" stands up, "lab" slides left into
           it and vanishes, then the GitHub mark slides out of the line the
           other way (left to right) into the space "lab" left behind. -->
      <span class="wordmark"><a href="https://github.com/mihneaptu">mihneaptu</a><span class="tick" aria-hidden="true">/</span><a class="home" href="index.html"><span>lab</span></a><a class="octo" href="https://github.com/mihneaptu/ui-lab" aria-label="GitHub repository"><svg aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a><span class="octo-stars" aria-hidden="true"></span></span>
      <button class="theme-toggle" type="button" aria-label="Switch color theme">dark</button>
    </header>

    <main>

      <section class="hero">
        <h1 class="page-title">Animations</h1>
      </section>

      <div class="card-grid">

        <a class="component-card" href="animations/melting-button/index.html">
          <span class="card-tag">test</span>
          <div class="card-preview" aria-hidden="true">
            <span class="btn btn-primary btn-sm">Button</span>
          </div>
          <div class="card-body">
            <p class="card-name">Melting button</p>
          </div>
        </a>

        <a class="component-card" href="animations/sun-moon/index.html">
          <div class="card-preview" aria-hidden="true">
            <!-- A still of the specimen's resting state (the sun);
                 the morph itself lives on the page behind the card. -->
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="6" fill="currentColor" stroke="none" />
              <line x1="12" y1="1"     x2="12"    y2="3" />
              <line x1="12" y1="21"    x2="12"    y2="23" />
              <line x1="1"  y1="12"    x2="3"     y2="12" />
              <line x1="21" y1="12"    x2="23"    y2="12" />
              <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36" />
              <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22" />
            </svg>
          </div>
          <div class="card-body">
            <p class="card-name">Sun to moon</p>
          </div>
        </a>

      </div>

    </main>

    <footer class="lab-footer">
      <span>mihneaptu/lab</span>
      <!-- The year is filled in by script so it never goes stale; the
           hardcoded text is just the fallback if JS is off. -->
      <span id="footer-year">2026</span>
    </footer>

  </div>

  <script src="scripts/theme.js"></script>
  <script src="scripts/octo-stars.js"></script>
  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
